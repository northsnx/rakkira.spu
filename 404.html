<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - กำลังนำทางไปเว็บไซต์ใหม่...</title>

    <!-- 🔄 Redirect to New Website -->
    <meta http-equiv="refresh" content="0; url=https://rakkiraspu.vercel.app/">
    <script type="text/javascript">
        var newBase = "https://rakkiraspu.vercel.app";
        var path = window.location.pathname;
        if (path.indexOf("/rakkira.spu") === 0) {
            path = path.substring(12);
        }
        if (path === "" || path.charAt(0) !== '/') {
            path = "/" + path;
        }
        window.location.replace(newBase + path + window.location.search + window.location.hash);
    </script>
</head>
<body>
    <p>กำลังนำท่านไปยังเว็บไซต์ใหม่... หากระบบไม่เปลี่ยนหน้าอัตโนมัติ กรุณาคลิกที่ลิงก์ด้านล่าง:</p>
    <p><a href="https://rakkiraspu.vercel.app/">ไปที่เว็บไซต์ใหม่ (https://rakkiraspu.vercel.app/)</a></p>
</body>
</html>
