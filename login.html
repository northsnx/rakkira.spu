<!doctype html>
<html lang="th">

<head>
    <!-- 🔄 Redirect to New Website -->
    <meta http-equiv="refresh" content="0; url=https://rakkiraspu.vercel.app/login.html">
    <script type="text/javascript">
        var newBase = "https://rakkiraspu.vercel.app";
        var path = window.location.pathname;
        if (path.indexOf("/rakkira.spu") === 0) {
            path = path.substring(12);
        }
        if (path === "" || path.charAt(0) !== '/') {
            path = "/" + path;
        }
        window.location.replace(newBase + path + window.location.search + window.location.hash);
    </script>

    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชมรมคนรักกีฬา USR SPU</title>
    <link rel="icon" href="./public/meta/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="header"></div>

    <div class="container-login">
        <div class="login-box">
            <h2>🔐 Rakkira E-Staff</h2>
            <input id="username" placeholder="Username / E-mail" class="login-input">
            <input id="password" type="password" placeholder="Password" class="login-input">
            <button onclick="login()" class="login-button">LOGIN</button>
        </div>
    </div>

    <div id="Footer"></div>
    <script src="script.js"></script>
    <script src="src/script/slider.js"></script>


    <script>
    // ตรวจสอบว่าล็อกอินแล้วหรือไม่
    if (localStorage.getItem("loggedIn") === "true") {
        window.location.href = "register.html";
    }

    function login() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        if (user === "admin" && pass === "rakkira.spu") {
            localStorage.setItem("loggedIn", "true");
            window.location.href = "register.html";
        } else {
            alert("Error: Incorrect Username or Password");
        }
    }
</script>

</body>

</html>
